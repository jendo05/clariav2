<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Claria — Create Account</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .page { justify-content: flex-start; overflow-y: auto; padding-top: 36px; padding-bottom: 40px; }

    .logo-row { display: flex; align-items: center; gap: 10px; }
    .logo-name { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--text-primary); }

    .page-heading {
      font-family: var(--font-display);
      font-size: clamp(22px, 6vw, 26px); font-weight: 700;
      color: var(--text-primary); line-height: 1.2;
    }

    .name-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .strength-bar  { height: 3px; border-radius: 2px; background: var(--border); overflow: hidden; margin-top: 6px; }
    .strength-fill { height: 100%; width: 0%; border-radius: 2px; transition: width 0.3s, background 0.3s; }
    .strength-text { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    .terms-row { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; color: var(--text-secondary); }
    .terms-row input[type="checkbox"] { margin-top: 3px; accent-color: var(--purple-primary); flex-shrink: 0; }

    .signin-row { text-align: center; font-size: 14px; color: var(--text-muted); }

    @media (max-width: 380px) {
      .name-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="page">
  <div class="orb orb-1"></div><div class="orb orb-2"></div>
  <div class="toast" id="toast"></div>

  <div class="content" style="gap: 0;">

    <div class="logo-row fade-up">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="7" stroke="#7c5cfc" stroke-width="1.4"/>
          <path d="M6.5 10 L8.5 12 L13.5 7" stroke="#a78bfa" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="logo-name">Claria</span>
    </div>

    <h1 class="page-heading fade-up d1" style="margin-top:24px;">Create your account</h1>
    <p class="fade-up d2" style="font-size:14px;color:var(--text-secondary);margin-top:6px;margin-bottom:24px;">Start building better habits today.</p>

    <div style="display:flex;flex-direction:column;gap:16px;" class="fade-up d2">

      <div class="name-row">
        <div class="form-group" id="grp-first">
          <label class="form-label" for="firstName">First name</label>
          <input class="form-input" type="text" id="firstName" placeholder="Ada" autocomplete="given-name"/>
          <span class="error-msg">Required</span>
        </div>
        <div class="form-group" id="grp-last">
          <label class="form-label" for="lastName">Last name</label>
          <input class="form-input" type="text" id="lastName" placeholder="Lovelace" autocomplete="family-name"/>
          <span class="error-msg">Required</span>
        </div>
      </div>

      <div class="form-group" id="grp-email">
        <label class="form-label" for="email">Email address</label>
        <input class="form-input" type="email" id="email" placeholder="ada@example.com" autocomplete="email"/>
        <span class="error-msg">Enter a valid email</span>
      </div>

      <div class="form-group" id="grp-pwd">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrap">
          <input class="form-input" type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password"/>
          <span class="input-icon" id="togglePwd">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </span>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <p class="strength-text" id="strengthText"></p>
        <span class="error-msg">Password must be at least 8 characters</span>
      </div>

      <div class="terms-row">
        <input type="checkbox" id="terms"/>
        <label for="terms">I agree to the <a class="link" href="#">Terms of Service</a> and <a class="link" href="#">Privacy Policy</a></label>
      </div>

      <button class="btn-primary fade-up d4" id="signupBtn" style="margin-top:4px;" onclick="handleSignup()">
        Create account
      </button>
    </div>

    <p class="signin-row fade-up d5" style="margin-top:20px;">
      Already have an account? <a class="link" href="login.html">Sign in</a>
    </p>

  </div>
</div>

<script>
  const togglePwd   = document.getElementById('togglePwd');
  const pwdInput    = document.getElementById('password');
  const strengthFill= document.getElementById('strengthFill');
  const strengthText= document.getElementById('strengthText');

  togglePwd.addEventListener('click', () => {
    const show = pwdInput.type === 'password';
    pwdInput.type = show ? 'text' : 'password';
    togglePwd.style.color = show ? 'var(--purple-light)' : '';
  });

  pwdInput.addEventListener('input', () => {
    const v = pwdInput.value; let s = 0;
    if (v.length >= 8) s++;
    if (/[A-Z]/.test(v)) s++;
    if (/[0-9]/.test(v)) s++;
    if (/[^A-Za-z0-9]/.test(v)) s++;
    const cfg = [
      {w:'0%',bg:'',t:''},
      {w:'25%',bg:'#f87171',t:'Weak'},
      {w:'50%',bg:'#fb923c',t:'Fair'},
      {w:'75%',bg:'#facc15',t:'Good'},
      {w:'100%',bg:'var(--purple-primary)',t:'Strong'},
    ][s];
    strengthFill.style.width = cfg.w;
    strengthFill.style.background = cfg.bg;
    strengthText.textContent = cfg.t;
  });

  function showToast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast '+type;
    void t.offsetWidth; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function validate() {
    let ok = true;
    [['grp-first','firstName'],['grp-last','lastName']].forEach(([g,id]) => {
      const empty = !document.getElementById(id).value.trim();
      document.getElementById(g).classList.toggle('has-error', empty);
      if (empty) ok = false;
    });
    const email = document.getElementById('email').value.trim();
    const eOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    document.getElementById('grp-email').classList.toggle('has-error', !eOk);
    if (!eOk) ok = false;
    const pOk = pwdInput.value.length >= 8;
    document.getElementById('grp-pwd').classList.toggle('has-error', !pOk);
    if (!pOk) ok = false;
    if (!document.getElementById('terms').checked) {
      showToast('Please accept the terms to continue.', 'error'); ok = false;
    }
    return ok;
  }

  async function handleSignup() {
    if (!validate()) return;
    const btn = document.getElementById('signupBtn');
    btn.textContent = 'Creating account…'; btn.disabled = true;
    const payload = {
      firstName: document.getElementById('firstName').value.trim(),
      lastName:  document.getElementById('lastName').value.trim(),
      email:     document.getElementById('email').value.trim(),
      password:  pwdInput.value,
    };
    try {
      /* ── BACKEND CONNECT: POST /api/auth/register ── */
     const res = await Auth.apiFetch('/api/auth/register', {
       method: 'POST',
       body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (res.ok) {
        Auth.setToken(data.token);
        Auth.setUser(data.user);
        showToast('Account created! Redirecting…', 'success');
        setTimeout(() => location.href = 'dashboard.html', 1400);
      } else {
        showToast(data.message || 'Something went wrong.', 'error');
        btn.textContent = 'Create account'; btn.disabled = false;
      }
    } catch {
      showToast('Cannot reach the server. Try again.', 'error');
      btn.textContent = 'Create account'; btn.disabled = false;
    }
  }
</script>
</body>
</html>
