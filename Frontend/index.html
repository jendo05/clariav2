<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Claria</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .splash-wrap {
      display: flex; flex-direction: column;
      align-items: center; gap: 18px;
      position: relative; z-index: 1;
    }
    .logo-ring {
      width: 84px; height: 84px; border-radius: 24px;
      background: var(--bg-card); border: 1px solid var(--purple-dim);
      display: flex; align-items: center; justify-content: center;
      animation: fadeUp 0.6s ease both;
    }
    .app-name {
      font-family: var(--font-display);
      font-size: clamp(28px, 8vw, 38px);
      font-weight: 800; color: var(--text-primary);
      letter-spacing: -1px;
      animation: fadeUp 0.6s ease 0.12s both;
    }
    .tagline {
      font-size: 14px; color: var(--text-muted); letter-spacing: 0.3px;
      animation: fadeUp 0.6s ease 0.22s both;
    }
    .progress-track {
      width: 60px; height: 3px; background: var(--bg-card);
      border-radius: 2px; overflow: hidden; margin-top: 6px;
      animation: fadeUp 0.6s ease 0.32s both;
    }
    .progress-bar {
      height: 100%; width: 0%; background: var(--purple-primary);
      border-radius: 2px; transition: width 1.8s cubic-bezier(0.4,0,0.2,1);
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="splash-wrap">
      <div class="logo-ring">
        <svg width="42" height="42" viewBox="0 0 42 42" fill="none">
          <circle cx="21" cy="21" r="15" stroke="#7c5cfc" stroke-width="1.5"/>
          <path d="M13 21 L18 26 L29 15" stroke="#a78bfa" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="21" cy="21" r="4" fill="#7c5cfc" opacity="0.22"/>
        </svg>
      </div>
      <p class="app-name">Claria</p>
      <p class="tagline">Built for frontend developers</p>
      <div class="progress-track"><div class="progress-bar" id="bar"></div></div>
    </div>
  </div>
  <script>
    setTimeout(() => { document.getElementById('bar').style.width = '100%'; }, 150);
    setTimeout(() => { window.location.href = 'onboarding-1.html'; }, 6000);
  </script>
</body>
</html>
