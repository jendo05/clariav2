<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Claria — Sign In</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .page { justify-content: flex-start; overflow-y: auto; padding-top: 48px; padding-bottom: 40px; }
    .logo-name { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--text-primary); }
    .page-heading {
      font-family: var(--font-display);
      font-size: clamp(22px,6vw,26px); font-weight: 700;
      color: var(--text-primary); line-height: 1.2;
    }
    .forgot-link { font-size: 12px; color: var(--text-muted); transition: color 0.2s; }
    .forgot-link:hover { color: var(--purple-light); }
  </style>
</head>
<body>
<div class="page">
  <div class="orb orb-1"></div><div class="orb orb-2"></div>
  <div class="toast" id="toast"></div>

  <div class="content" style="gap:0;">

    <div class="logo-row fade-up">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="7" stroke="#7c5cfc" stroke-width="1.4"/>
          <path d="M6.5 10 L8.5 12 L13.5 7" stroke="#a78bfa" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="logo-name">Claria</span>
    </div>

    <h1 class="page-heading fade-up d1" style="margin-top:28px;">Welcome back</h1>
    <p class="fade-up d2" style="font-size:14px;color:var(--text-secondary);margin-top:6px;margin-bottom:28px;">Sign in to your workspace.</p>

    <div style="display:flex;flex-direction:column;gap:16px;" class="fade-up d2">
      <div class="form-group" id="grp-email">
        <label class="form-label" for="email">Email address</label>
        <input class="form-input" type="email" id="email" placeholder="ada@example.com" autocomplete="email"/>
        <span class="error-msg">Enter a valid email</span>
      </div>

      <div class="form-group" id="grp-pwd">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrap">
          <input class="form-input" type="password" id="password" placeholder="Your password" autocomplete="current-password"/>
          <span class="input-icon" id="togglePwd">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </span>
        </div>
        <span class="error-msg">Password is required</span>
      </div>

      <div style="display:flex;justify-content:flex-end;margin-top:-8px;">
        <a class="forgot-link" href="forgot-password.html">Forgot password?</a>
      </div>

      <button class="btn-primary fade-up d3" id="loginBtn" onclick="handleLogin()">Sign in</button>
    </div>

    <p class="fade-up d4" style="text-align:center;font-size:14px;color:var(--text-muted);margin-top:20px;">
      Don't have an account? <a class="link" href="signup.html">Create one</a>
    </p>

  </div>
</div>

<script src="auth.js">
  if (localStorage.getItem('claria_token')) location.href = 'dashboard.html';

  document.getElementById('togglePwd').addEventListener('click', () => {
    const p = document.getElementById('password');
    p.type = p.type === 'password' ? 'text' : 'password';
  });

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

  function showToast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast '+type;
    void t.offsetWidth; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function validate() {
    let ok = true;
    const email = document.getElementById('email').value.trim();
    const eOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    document.getElementById('grp-email').classList.toggle('has-error', !eOk);
    if (!eOk) ok = false;
    const pOk = document.getElementById('password').value.length > 0;
    document.getElementById('grp-pwd').classList.toggle('has-error', !pOk);
    if (!pOk) ok = false;
    return ok;
  }

  async function handleLogin() {
    if (!validate()) return;
    const btn = document.getElementById('loginBtn');
    btn.textContent = 'Signing in…'; btn.disabled = true;
    const payload = {
      email:    document.getElementById('email').value.trim(),
      password: document.getElementById('password').value,
    };
    try {
      /* ── BACKEND CONNECT: POST /api/auth/login ── */
      const res = await Auth.apiFetch('/api/auth/login', {
         method: 'POST',
         body: JSON.stringify(payload),
       });
      const data = await res.json();
      if (res.ok) {
        Auth.setToken(data.token);
        Auth.setUser(data.user);
        showToast('Welcome back!', 'success');
        setTimeout(() => {
          /* ── Role-based redirect ── */
          location.href = data.user.role === 'admin' ? 'admin/dashboard.html' : 'dashboard.html';
        }, 1200);
      } else {
        showToast(data.message || 'Invalid credentials.', 'error');
        btn.textContent = 'Sign in'; btn.disabled = false;
      }
    } catch {
      showToast('Cannot reach the server. Try again.', 'error');
      btn.textContent = 'Sign in'; btn.disabled = false;
    }
  }
</script>
</body>
</html>
