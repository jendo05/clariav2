<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claria — Stay Focused</title>
  <link rel="stylesheet" href="style.css" />
  <style>
      body{
       overflow-x: hidden;
       overflow-y: hidden;
    }
    .screen-shell { flex-direction: column; min-height: 100vh; }

    .illus-wrap {
      width: 100%; max-width: 400px;
      display: flex; align-items: center; justify-content: center;
      padding: 48px 0 8px; position: relative; z-index: 1;
      animation: fadeUp 0.5s ease both;
    }

    .clock-wrap {
      width: 180px; height: 180px;
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }

    .clock-bg {
      width: 180px; height: 180px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      position: absolute;
    }

    .clock-ring {
      width: 180px; height: 180px;
      position: absolute;
    }

    .clock-center {
      position: relative; z-index: 1;
      text-align: center;
    }
    .clock-time {
      font-family: var(--font-display);
      font-size: 32px; font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -1px;
    }
    .clock-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .stats-row {
      display: flex; gap: 12px; margin-top: 24px;
    }
    .stat-pill {
      padding: 8px 16px; border-radius: 20px;
      background: var(--bg-card); border: 1px solid var(--border);
      text-align: center;
    }
    .stat-val { font-size: 16px; font-weight: 600; color: var(--text-primary); font-family: var(--font-display); }
    .stat-lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .copy-wrap {
      width: 100%; max-width: 400px;
      padding: 8px 0; position: relative; z-index: 1;
    }
    .copy-wrap h1 {
      font-family: var(--font-display);
      font-size: 28px; font-weight: 700;
      color: var(--text-primary); line-height: 1.25;
      animation: fadeUp 0.5s ease 0.1s both;
    }
    .copy-wrap h1 span { color: var(--purple-light); }
    .copy-wrap p {
      font-size: 15px; color: var(--text-secondary);
      line-height: 1.65; margin-top: 12px;
      animation: fadeUp 0.5s ease 0.2s both;
    }

    .bottom-wrap {
      width: 100%; max-width: 400px;
      display: flex; flex-direction: column; gap: 12px;
      padding: 16px 0 8px; position: relative; z-index: 1;
      animation: fadeUp 0.5s ease 0.3s both;
    }

    .signin-row {
      text-align: center; font-size: 14px; color: var(--text-muted); padding-top: 4px;
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="screen-shell">

    <div class="illus-wrap">
      <div style="display:flex; flex-direction:column; align-items:center; gap:0;">
        <div class="clock-wrap">
          <div class="clock-bg"></div>
          <svg class="clock-ring" viewBox="0 0 180 180">
            <circle cx="90" cy="90" r="78" fill="none" stroke="#2a2445" stroke-width="6"/>
            <circle cx="90" cy="90" r="78" fill="none" stroke="#7c5cfc" stroke-width="6"
              stroke-dasharray="490" stroke-dashoffset="163"
              stroke-linecap="round"
              transform="rotate(-90 90 90)"/>
          </svg>
          <div class="clock-center">
            <p class="clock-time">25:00</p>
            <p class="clock-label">Focus session</p>
          </div>
        </div>
        <div class="stats-row">
          <div class="stat-pill">
            <p class="stat-val">4</p>
            <p class="stat-lbl">Sessions</p>
          </div>
          <div class="stat-pill">
            <p class="stat-val">1.8h</p>
            <p class="stat-lbl">Deep work</p>
          </div>
          <div class="stat-pill">
            <p class="stat-val">12</p>
            <p class="stat-lbl">Tasks done</p>
          </div>
        </div>
      </div>
    </div>

    <div class="copy-wrap card">
      <h1>Stay in the zone,<br/><span>every single day</span></h1>
      <p>Track focus sessions, review your productivity patterns, and build the deep work habit that ships great products.</p>
    </div>

    <div class="bottom-wrap card">
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot active"></div>
      </div>
      <button class="btn-primary" onclick="window.location.href='signup.html'">Get Started</button>
      <p class="signin-row">Already have an account? <a class="link" href="login.html">Sign in</a></p>
    </div>

  </div>

</body>
</html>
