<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Claria — Focus</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .page { justify-content: space-between; padding-top: 28px; padding-bottom: 28px; }

    .clock-outer {
      position: relative; width: 160px; height: 160px;
      display: flex; align-items: center; justify-content: center;
    }
    .clock-bg {
      position: absolute; inset: 0; border-radius: 50%;
      background: var(--bg-card); border: 1px solid var(--border);
    }
    .clock-svg { position: absolute; inset: 0; }
    .clock-center { position: relative; z-index: 1; text-align: center; }
    .clock-time {
      font-family: var(--font-display);
      font-size: 28px; font-weight: 700;
      color: var(--text-primary); letter-spacing: -1px;
    }
    .clock-lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .stats-row { display: flex; gap: 10px; margin-top: 18px; }
    .stat-pill {
      flex: 1; padding: 10px 8px;
      border-radius: 12px; background: var(--bg-card);
      border: 1px solid var(--border); text-align: center;
    }
    .stat-val { font-size: 18px; font-weight: 700; color: var(--text-primary); font-family: var(--font-display); }
    .stat-lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .copy h1 {
      font-family: var(--font-display);
      font-size: clamp(22px, 6vw, 28px); font-weight: 700;
      color: var(--text-primary); line-height: 1.25;
    }
    .copy h1 span { color: var(--purple-light); }
    .copy p { font-size: 14px; color: var(--text-secondary); line-height: 1.65; margin-top: 10px; }
    .bottom { display: flex; flex-direction: column; gap: 14px; flex-shrink: 0; }
    .signin-row { text-align: center; font-size: 14px; color: var(--text-muted); }
  </style>
</head>
<body>
<div class="page">
  <div class="orb orb-1"></div><div class="orb orb-2"></div>

  <div class="illus-shell content fade-up" style="flex-direction:column; align-items:center; gap:0;">
    <div class="clock-outer">
      <div class="clock-bg"></div>
      <svg class="clock-svg" viewBox="0 0 160 160">
        <circle cx="80" cy="80" r="68" fill="none" stroke="#2a2445" stroke-width="6"/>
        <circle cx="80" cy="80" r="68" fill="none" stroke="#7c5cfc" stroke-width="6"
          stroke-dasharray="427" stroke-dashoffset="142"
          stroke-linecap="round" transform="rotate(-90 80 80)"/>
      </svg>
      <div class="clock-center">
        <p class="clock-time">25:00</p>
        <p class="clock-lbl">Focus session</p>
      </div>
    </div>
    <div class="stats-row" style="width:100%;max-width:260px;">
      <div class="stat-pill"><p class="stat-val">4</p><p class="stat-lbl">Sessions</p></div>
      <div class="stat-pill"><p class="stat-val">1.8h</p><p class="stat-lbl">Deep work</p></div>
      <div class="stat-pill"><p class="stat-val">12</p><p class="stat-lbl">Tasks done</p></div>
    </div>
  </div>

  <div class="content copy fade-up d2" style="margin: 16px 0;">
    <h1>Stay in the zone,<br/><span>every single day</span></h1>
    <p>Track focus sessions, review productivity patterns, and build the deep work habit that ships great products.</p>
  </div>

  <div class="content bottom fade-up d3">
    <div class="dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot active"></div>
    </div>
    <button class="btn-primary" onclick="location.href='signup.html'">Get Started</button>
    <p class="signin-row">Already have an account? <a class="link" href="login.html">Sign in</a></p>
  </div>
</div>
</body>
</html>
