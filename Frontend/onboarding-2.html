<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Claria — Smart Tasks</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .page { justify-content: space-between; padding-top: 20px; padding-bottom: 28px; }
    .top-bar {
      width: 100%; max-width: 420px;
      display: flex; justify-content: flex-end;
      position: relative; z-index: 1; flex-shrink: 0;
    }
    .task-card {
      width: 100%; max-width: 300px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 18px;
    }
    .task-head {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
    }
    .sprint-badge {
      padding: 3px 10px; border-radius: 20px;
      background: rgba(124,92,252,0.15); color: var(--purple-light);
      font-size: 11px; font-weight: 500;
    }
    .task-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 11px; border-radius: 10px; margin-bottom: 7px;
    }
    .task-item.done { background: rgba(124,92,252,0.1); }
    .task-item.idle { background: var(--bg-surface); border: 1px solid var(--border); }
    .chk {
      width: 17px; height: 17px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .chk.done { background: var(--purple-primary); }
    .chk.done::after {
      content: ''; width: 7px; height: 5px;
      border-left: 2px solid #fff; border-bottom: 2px solid #fff;
      transform: rotate(-45deg) translateY(-1px); display: block;
    }
    .chk.idle { border: 1.5px solid var(--border); }
    .task-txt { font-size: 12px; }
    .task-txt.done { color: var(--text-muted); text-decoration: line-through; }
    .task-txt.idle { color: var(--text-secondary); }
    .prog-row { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
    .prog-lbl { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
    .prog-track { flex: 1; height: 4px; background: var(--bg-surface); border-radius: 2px; overflow: hidden; }
    .prog-fill  { height: 100%; width: 66%; background: var(--purple-primary); border-radius: 2px; }

    .copy h1 {
      font-family: var(--font-display);
      font-size: clamp(22px, 6vw, 28px); font-weight: 700;
      color: var(--text-primary); line-height: 1.25;
    }
    .copy h1 span { color: var(--purple-light); }
    .copy p { font-size: 14px; color: var(--text-secondary); line-height: 1.65; margin-top: 10px; }
    .bottom { display: flex; flex-direction: column; gap: 14px; flex-shrink: 0; }
  </style>
</head>
<body>
<div class="page">
  <div class="orb orb-1"></div><div class="orb orb-2"></div>

  <div class="top-bar fade-up">
    <button class="btn-skip" onclick="location.href='signup.html'">Skip</button>
  </div>

  <div class="illus-shell content fade-up d1">
    <div class="task-card">
      <div class="task-head">
        <p style="font-size:13px;font-weight:600;color:var(--text-primary);font-family:var(--font-display)">Sprint Tasks</p>
        <span class="sprint-badge">Week 3</span>
      </div>
      <div class="task-item done"><div class="chk done"></div><span class="task-txt done">Fix navbar z-index bug</span></div>
      <div class="task-item done"><div class="chk done"></div><span class="task-txt done">Write modal component</span></div>
      <div class="task-item idle"><div class="chk idle"></div><span class="task-txt idle">Refactor API hooks</span></div>
      <div class="task-item idle"><div class="chk idle"></div><span class="task-txt idle">Add dark mode toggle</span></div>
      <div class="prog-row">
        <span class="prog-lbl">2 / 3 done</span>
        <div class="prog-track"><div class="prog-fill"></div></div>
        <span class="prog-lbl">66%</span>
      </div>
    </div>
  </div>

  <div class="content copy fade-up d2" style="margin: 16px 0;">
    <h1>Ship faster with<br/><span>smart task tracking</span></h1>
    <p>Break down features, squash bugs, and stay on top of sprints — without losing your flow state mid-session.</p>
  </div>

  <div class="content bottom fade-up d3">
    <div class="dots">
      <div class="dot"></div><div class="dot active"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <button class="btn-primary" onclick="location.href='onboarding-3.html'">Next</button>
  </div>
</div>
</body>
</html>
